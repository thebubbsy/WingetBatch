name: Publish PowerShell Module

on:
  release:
    types: [published]
  push:
    branches:
      - main
    paths:
      - 'WingetBatch.psd1'

jobs:
  publish-to-gallery:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Publish WingetBatch to PowerShell Gallery
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        shell: pwsh
        run: |
          if (-not $env:PSGALLERY_API_KEY) {
            Write-Error "PSGALLERY_API_KEY secret is not set!"
            exit 1
          }
          Publish-Module -Path . -NuGetApiKey $env:PSGALLERY_API_KEY -Force
